<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅游知识库系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 800px;
            width: 90%;
        }

        h1 {
            color: #667eea;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .feature-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .feature-card h3 {
            margin-bottom: 10px;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .stats {
            background: #f7f7f7;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .stats h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        #statsInfo {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌴 旅游知识库</h1>
        <p class="subtitle">智能旅游问答系统</p>

        <div class="features">
            <div class="feature-card">
                <h3>📍 景点推荐</h3>
                <p>查询各地必去景点</p>
            </div>
            <div class="feature-card">
                <h3>🗺️ 线路规划</h3>
                <p>智能行程推荐</p>
            </div>
            <div class="feature-card">
                <h3>🏨 实用信息</h3>
                <p>酒店美食交通</p>
            </div>
        </div>

        <div class="buttons">
            <a href="/import" class="btn btn-primary">📤 导入文档</a>
            <a href="/chat" class="btn btn-secondary">💬 开始对话</a>
        </div>

        <div class="stats">
            <h3>📊 知识库状态</h3>
            <div id="statsInfo">加载中...</div>
        </div>
    </div>

    <script>
        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();

                if (data.success) {
                    document.getElementById('statsInfo').innerHTML = `
                        <p><strong>集合名称:</strong> ${data.collection_name}</p>
                        <p><strong>记录总数:</strong> ${data.num_entities} 条</p>
                        <p><strong>状态:</strong> ${data.is_loaded ? '✅ 已加载' : '⏸️ 未加载'}</p>
                    `;
                }
            } catch (error) {
                document.getElementById('statsInfo').innerHTML =
                    '<p style="color: red;">❌ 无法获取统计信息</p>';
            }
        }

        loadStats();
    </script>
</body>
</html>
